<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Annotator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F9F7F3;
  --bg-warm: #F0EDE6;
  --bg-hover: #EAE6DD;
  --border: #DDD7CC;
  --border-light: #E8E3D9;
  --text: #2D2A26;
  --text-secondary: #6B6560;
  --text-tertiary: #9B958C;
  --accent: #C4704B;
  --accent-hover: #B5613D;
  --accent-light: rgba(196, 112, 75, 0.08);
  --accent-wash: rgba(196, 112, 75, 0.12);
  --danger: #B85450;
  --danger-light: rgba(184, 84, 80, 0.08);
  --danger-wash: rgba(184, 84, 80, 0.12);
  --success: #5B8A5E;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-sm: 0 1px 3px rgba(45, 42, 38, 0.06);
  --shadow-md: 0 4px 12px rgba(45, 42, 38, 0.08), 0 1px 3px rgba(45, 42, 38, 0.06);
  --shadow-lg: 0 8px 30px rgba(45, 42, 38, 0.12), 0 2px 8px rgba(45, 42, 38, 0.06);
  --font-display: 'Source Serif 4', Georgia, 'Times New Roman', serif;
  --font-ui: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --transition: 180ms ease-out;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--bg-warm);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-right: 6px;
  flex-shrink: 0;
}

.topbar-brand svg { color: var(--accent); flex-shrink: 0; }

.topbar-brand span {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

.topbar input[type="text"] {
  flex: 1;
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-size: 12.5px;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.topbar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}

.topbar-actions { display: flex; gap: 4px; flex-shrink: 0; }

.btn-ghost {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12.5px;
  font-weight: 500;
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text-secondary);
  transition: all var(--transition);
}

.btn-ghost:hover {
  background: var(--bg-hover);
  color: var(--text);
  border-color: var(--border);
}

/* ── Main layout ── */
.main { display: flex; flex: 1; overflow: hidden; }

.preview-area { flex: 1; position: relative; background: #fff; }
.preview-area iframe { width: 100%; height: 100%; border: none; }

/* ── Side panel ── */
.side-panel {
  width: 320px;
  min-width: 320px;
  background: var(--bg-warm);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.panel-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.panel-title {
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.panel-title h3 {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}

.ann-count {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-tertiary);
  min-width: 18px;
  text-align: center;
  padding: 1px 6px;
  background: var(--accent-light);
  color: var(--accent);
  border-radius: 99px;
  display: none;
}

.ann-count.visible { display: inline-block; }

.panel-actions { display: flex; gap: 4px; }

.btn-panel {
  padding: 5px 10px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-ui);
  transition: all var(--transition);
  background: transparent;
}

.btn-panel.copy {
  color: var(--text-secondary);
}
.btn-panel.copy:hover {
  background: var(--accent-light);
  color: var(--accent);
}

.btn-panel.clear {
  color: var(--text-tertiary);
}
.btn-panel.clear:hover {
  background: var(--danger-light);
  color: var(--danger);
}

/* ── Annotation list ── */
.ann-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  scroll-behavior: smooth;
}

.ann-list::-webkit-scrollbar { width: 5px; }
.ann-list::-webkit-scrollbar-track { background: transparent; }
.ann-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
.ann-list::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ── Empty state ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 28px 40px;
  text-align: center;
}

.empty-state svg {
  color: var(--border);
  margin-bottom: 20px;
}

.empty-state p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
  max-width: 220px;
}

.empty-state kbd {
  display: inline-block;
  padding: 2px 6px;
  font-size: 11px;
  font-family: var(--font-ui);
  font-weight: 500;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-secondary);
  box-shadow: 0 1px 0 var(--border);
}

/* ── Annotation items ── */
.ann-item {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  position: relative;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--transition);
  animation: slideIn 250ms cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.ann-item:hover {
  border-color: var(--border);
  box-shadow: var(--shadow-sm);
}

.ann-item .snippet {
  font-family: var(--font-display);
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.55;
  word-break: break-word;
  font-style: italic;
}

.ann-item .snippet::before { content: '\201C'; color: var(--accent); font-weight: 600; }
.ann-item .snippet::after { content: '\201D'; color: var(--accent); font-weight: 600; }

.ann-item .note {
  font-size: 12.5px;
  color: var(--text-secondary);
  margin-top: 8px;
  line-height: 1.5;
  word-break: break-word;
  padding-left: 10px;
  border-left: 2px solid var(--accent-wash);
}

.ann-item .remove-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 14px;
  border-radius: 4px;
  opacity: 0;
  transition: all var(--transition);
}

.ann-item:hover .remove-btn { opacity: 1; }
.ann-item .remove-btn:hover {
  background: var(--danger-light);
  color: var(--danger);
}

/* ── Floating toolbar ── */
.ann-toolbar {
  position: fixed;
  display: none;
  z-index: 10000;
  background: var(--text);
  border-radius: 8px;
  padding: 3px;
  box-shadow: var(--shadow-lg);
  gap: 2px;
  animation: toolbarIn 150ms cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes toolbarIn {
  from { opacity: 0; transform: translateY(4px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.ann-toolbar.visible { display: flex; }

.ann-toolbar button {
  padding: 7px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-ui);
  color: #F9F7F3;
  background: transparent;
  transition: background var(--transition);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ann-toolbar button:hover { background: rgba(249, 247, 243, 0.12); }

.ann-toolbar button svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

/* ── Floating note popover ── */
.note-popover-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 11000;
}

.note-popover-overlay.visible { display: block; }

.note-popover {
  position: fixed;
  display: none;
  z-index: 12000;
  width: 420px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 16px;
  animation: popoverIn 200ms cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes popoverIn {
  from { opacity: 0; transform: translateY(6px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.note-popover.visible { display: block; }

.note-popover-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.note-popover-selected {
  font-family: var(--font-display);
  font-size: 13px;
  font-style: italic;
  color: var(--text-secondary);
  padding: 8px 10px;
  background: var(--accent-light);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  max-height: 72px;
  overflow: hidden;
  line-height: 1.5;
}

.note-popover textarea {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-warm);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-ui);
  resize: none;
  outline: none;
  line-height: 1.5;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.note-popover textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}

.note-popover-actions {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 10px;
}

.btn-save {
  padding: 6px 16px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-ui);
  background: var(--accent);
  color: #fff;
  transition: background var(--transition);
}

.btn-save:hover { background: var(--accent-hover); }

.btn-cancel {
  padding: 6px 12px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-ui);
  background: transparent;
  color: var(--text-secondary);
  transition: all var(--transition);
}

.btn-cancel:hover {
  background: var(--bg-hover);
  color: var(--text);
}

/* ── Editable note on annotation items ── */
.ann-item .note-text { cursor: pointer; }
.ann-item .note-text:hover { color: var(--text); }
.ann-item .add-note-hint {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 6px;
  cursor: pointer;
  opacity: 0;
  transition: opacity var(--transition);
}
.ann-item:hover .add-note-hint { opacity: 1; }
.ann-item .add-note-hint:hover { color: var(--accent); }

/* ── Annotation type styles ── */
.ann-item[data-type="add"] .note { border-left-color: rgba(91,138,94,0.2); }

/* Delete type */
.ann-item[data-type="delete"] .snippet { text-decoration: line-through; color: var(--danger); }
.ann-item[data-type="delete"] .snippet::before,
.ann-item[data-type="delete"] .snippet::after { color: var(--danger); }
.ann-item[data-type="delete"] .note { border-left-color: var(--danger-wash); }

.ann-item .type-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 6px;
  border-radius: 4px;
  margin-bottom: 6px;
}
.type-badge.modify { background: var(--accent-light); color: var(--accent); }
.type-badge.add { background: rgba(91,138,94,0.1); color: var(--success); }
.type-badge.delete { background: var(--danger-light); color: var(--danger); }

/* ── Toolbar keyboard hints ── */
.ann-toolbar .kbd-hint {
  font-size: 10px;
  opacity: 0.5;
  padding: 1px 4px;
  border: 1px solid rgba(249,247,243,0.25);
  border-radius: 3px;
  margin-left: 2px;
}

.ann-toolbar .divider {
  width: 1px;
  background: rgba(249,247,243,0.15);
  margin: 4px 2px;
  flex-shrink: 0;
}

/* ── Edit counter in topbar ── */
.edit-counter {
  font-size: 12px;
  font-weight: 500;
  color: var(--success);
  padding: 3px 8px;
  background: rgba(91,138,94,0.1);
  border-radius: 99px;
  display: none;
  flex-shrink: 0;
}
.edit-counter.visible { display: inline-block; }

/* Confirmation toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--bg);
  padding: 10px 20px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 20000;
}

.toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Custom confirm dialog ── */
.confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(45, 42, 38, 0.3);
  z-index: 30000;
  animation: confirmFadeIn 150ms ease-out both;
}
.confirm-overlay.visible { display: flex; align-items: center; justify-content: center; }

@keyframes confirmFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.confirm-dialog {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  padding: 24px;
  width: 340px;
  animation: confirmSlideIn 200ms cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes confirmSlideIn {
  from { opacity: 0; transform: scale(0.95) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.confirm-dialog h4 {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}

.confirm-dialog p {
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 20px;
}

.confirm-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

.confirm-actions .btn-cancel {
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: var(--bg);
}

.confirm-actions .btn-danger {
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-ui);
  background: var(--danger);
  color: #fff;
  transition: background var(--transition);
}

.confirm-actions .btn-danger:hover { background: #a34845; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    <span>Annotator</span>
  </div>
  <input type="text" id="urlInput" spellcheck="false" placeholder="Preview URL">
  <span class="edit-counter" id="editCounter"></span>
  <div class="topbar-actions">
    <button class="btn-ghost" id="reloadBtn">Reload</button>
  </div>
</div>

<div class="main">
  <div class="preview-area">
    <iframe id="previewFrame"></iframe>
  </div>

  <div class="side-panel">
    <div class="panel-header">
      <div class="panel-title">
        <h3>Notes</h3>
        <span class="ann-count" id="annCount">0</span>
      </div>
      <div class="panel-actions">
        <button class="btn-panel copy" id="copyAllBtn">Copy All</button>
        <button class="btn-panel clear" id="clearAllBtn">Clear</button>
      </div>
    </div>
    <div class="ann-list" id="annList">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
        <p>Select text in the preview, then press <kbd>M</kbd> to modify, <kbd>A</kbd> to add, or <kbd>D</kbd> to delete</p>
      </div>
    </div>
  </div>
</div>

<div class="note-popover-overlay" id="noteOverlay"></div>
<div class="note-popover" id="notePopover">
  <div class="note-popover-label" id="notePopoverLabel">New annotation</div>
  <div class="note-popover-selected" id="notePopoverSelected"></div>
  <textarea id="notePopoverInput" rows="3" placeholder="Add a note (optional)"></textarea>
  <div class="note-popover-actions">
    <button class="btn-cancel" id="notePopoverCancel">Cancel</button>
    <button class="btn-save" id="notePopoverSave">Save</button>
  </div>
</div>

<div class="ann-toolbar" id="annToolbar">
  <button data-action="modify">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Modify <span class="kbd-hint">M</span>
  </button>
  <div class="divider"></div>
  <button data-action="add">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add <span class="kbd-hint">A</span>
  </button>
  <div class="divider"></div>
  <button data-action="delete">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Delete <span class="kbd-hint">D</span>
  </button>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <h4 id="confirmTitle">Clear all annotations?</h4>
    <p id="confirmMessage">This will remove all annotations and highlights from this document. This cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" id="confirmCancel">Cancel</button>
      <button class="btn-danger" id="confirmOk">Clear All</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  var TYPE_MODIFY = 'modify';
  var TYPE_ADD = 'add';
  var TYPE_DELETE = 'delete';

  var HIGHLIGHT_CSS = [
    '.ann-highlight { background: rgba(196,112,75,0.14) !important; border-bottom: 2px solid rgba(196,112,75,0.5) !important; cursor: pointer !important; transition: background 0.15s ease !important; }',
    '.ann-highlight:hover { background: rgba(196,112,75,0.25) !important; }',
    '.ann-highlight-add { background: rgba(91,138,94,0.12) !important; border-bottom: 2px solid rgba(91,138,94,0.5) !important; cursor: pointer !important; transition: background 0.15s ease !important; }',
    '.ann-highlight-add:hover { background: rgba(91,138,94,0.22) !important; }',
    '.ann-highlight-delete { background: rgba(184,84,80,0.1) !important; border-bottom: 2px solid rgba(184,84,80,0.5) !important; text-decoration: line-through !important; cursor: pointer !important; transition: background 0.15s ease !important; }',
    '.ann-highlight-delete:hover { background: rgba(184,84,80,0.2) !important; }'
  ].join('\n');

  const frame = document.getElementById('previewFrame');
  const toolbar = document.getElementById('annToolbar');
  const annList = document.getElementById('annList');
  const emptyState = document.getElementById('emptyState');
  const urlInput = document.getElementById('urlInput');
  const reloadBtn = document.getElementById('reloadBtn');
  const copyAllBtn = document.getElementById('copyAllBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const annCount = document.getElementById('annCount');
  const editCounterEl = document.getElementById('editCounter');
  const noteOverlay = document.getElementById('noteOverlay');
  const notePopover = document.getElementById('notePopover');
  const notePopoverLabel = document.getElementById('notePopoverLabel');
  const notePopoverSelected = document.getElementById('notePopoverSelected');
  const notePopoverInput = document.getElementById('notePopoverInput');
  const notePopoverCancel = document.getElementById('notePopoverCancel');
  const notePopoverSave = document.getElementById('notePopoverSave');
  const toastEl = document.getElementById('toast');

  let annotations = [];
  let currentSelection = null;
  let highlightCounter = 0;
  let toastTimer = null;

  // --- Init from query params ---
  const params = new URLSearchParams(window.location.search);
  const bufnr = params.get('page');
  if (bufnr) {
    const previewPath = '/page/' + bufnr;
    frame.src = previewPath;
    urlInput.value = window.location.origin + previewPath;
  } else {
    frame.src = '/';
    urlInput.value = window.location.origin;
  }

  // --- Toast ---
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('visible'), 2000);
  }

  // --- Storage ---
  function storageKey() {
    try {
      const title = frame.contentDocument && frame.contentDocument.title;
      if (title) return 'md-annotator:' + title;
    } catch(e) {}
    return 'md-annotator:' + urlInput.value.trim();
  }

  function saveAnnotations() {
    try {
      const data = annotations.map(a => ({
        id: a.id, type: a.type, text: a.text, note: a.note, context: a.context
      }));
      localStorage.setItem(storageKey(), JSON.stringify(data));
    } catch(e) {}
  }

  function loadAnnotations() {
    try {
      const raw = localStorage.getItem(storageKey());
      if (raw) {
        annotations = JSON.parse(raw);
        annotations.forEach(a => { if (!a.id) a.id = 'ann-' + (++highlightCounter); });
      }
    } catch(e) { annotations = []; }
  }

  var lastCount = -1;
  function updateCount() {
    if (annotations.length === lastCount) return;
    lastCount = annotations.length;
    annCount.textContent = lastCount;
    annCount.classList.toggle('visible', lastCount > 0);
    copyAllBtn.textContent = lastCount > 0
      ? 'Copy All (' + lastCount + ')'
      : 'Copy All';
  }

  // --- URL handling ---
  function reloadIframe() {
    var src = bufnr ? '/page/' + bufnr : urlInput.value.trim();
    frame.src = '';
    setTimeout(() => { frame.src = src; }, 0);
  }
  reloadBtn.addEventListener('click', reloadIframe);
  urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') reloadIframe(); });

  // --- Inject highlight CSS into iframe ---
  function injectStyles() {
    try {
      const doc = frame.contentDocument;
      if (!doc || doc.getElementById('ann-styles')) return;
      const style = doc.createElement('style');
      style.id = 'ann-styles';
      style.textContent = HIGHLIGHT_CSS + '\n@keyframes saveFlash { 0% { box-shadow: 0 0 0 0 rgba(91,138,94,0.4); } 50% { box-shadow: 0 0 0 3px rgba(91,138,94,0.2); } 100% { box-shadow: 0 0 0 0 rgba(91,138,94,0); } }';
      doc.head.appendChild(style);
    } catch(e) {}
  }

  function markClassName(type) {
    return type === TYPE_DELETE ? 'ann-highlight-delete' : type === TYPE_ADD ? 'ann-highlight-add' : 'ann-highlight';
  }

  function wrapRangeInMark(range, id, type) {
    var doc = frame.contentDocument;
    var cls = markClassName(type);

    // Collect text nodes within the range
    var textNodes = [];
    var walker = doc.createTreeWalker(range.commonAncestorContainer, NodeFilter.SHOW_TEXT, null, false);
    var node;
    while (node = walker.nextNode()) {
      if (range.intersectsNode(node)) textNodes.push(node);
    }
    // If commonAncestor is itself a text node
    if (range.commonAncestorContainer.nodeType === 3) {
      textNodes = [range.commonAncestorContainer];
    }

    if (textNodes.length === 0) return null;

    var firstMark = null;
    textNodes.forEach(function(tn) {
      var start = (tn === range.startContainer) ? range.startOffset : 0;
      var end = (tn === range.endContainer) ? range.endOffset : tn.textContent.length;
      if (start >= end) return;

      var r = doc.createRange();
      r.setStart(tn, start);
      r.setEnd(tn, end);
      var mark = doc.createElement('mark');
      mark.className = cls;
      mark.dataset.annId = id;
      r.surroundContents(mark);
      if (!firstMark) firstMark = mark;
    });
    return firstMark;
  }

  function unwrapMark(el) {
    var parent = el.parentNode;
    while (el.firstChild) parent.insertBefore(el.firstChild, el);
    parent.removeChild(el);
    parent.normalize();
  }

  function unwrapAllMarks(id) {
    try {
      var doc = frame.contentDocument;
      doc.querySelectorAll('[data-ann-id="' + id + '"]').forEach(function(el) { unwrapMark(el); });
    } catch(e) {}
  }

  function highlightRange(range, id, type) {
    try {
      if (!frame.contentDocument) return null;
      return wrapRangeInMark(range, id, type);
    } catch(e) { return null; }
  }

  function reapplyHighlights() {
    try {
      const doc = frame.contentDocument;
      if (!doc || !doc.body) return;
      injectStyles();
      annotations.forEach(ann => {
        if (!ann.text) return;
        findAndHighlight(doc.body, ann.text, ann.id, ann.type);
      });
    } catch(e) {}
  }

  function findAndHighlight(root, text, id, type) {
    const doc = frame.contentDocument;
    const walker = doc.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
    const searchText = text.substring(0, 100);
    let node;
    while (node = walker.nextNode()) {
      const idx = node.textContent.indexOf(searchText);
      if (idx !== -1) {
        const range = doc.createRange();
        range.setStart(node, idx);
        range.setEnd(node, Math.min(idx + text.length, node.textContent.length));
        try { wrapRangeInMark(range, id, type); } catch(e) {}
        return true;
      }
    }
    return false;
  }

  // --- Inline editing ---
  var textSnapshot = new WeakMap();
  var isEditing = false;
  var editTimer = null;
  var editCount = 0;

  function snapshotText(doc) {
    doc.querySelectorAll('[data-source-line]').forEach(function(el) {
      textSnapshot.set(el, el.textContent);
    });
  }

  // Find the minimal changed substring between two strings
  function minimalDiff(oldStr, newStr) {
    var i = 0;
    while (i < oldStr.length && i < newStr.length && oldStr[i] === newStr[i]) i++;
    var j = 0;
    while (j < oldStr.length - i && j < newStr.length - i && oldStr[oldStr.length - 1 - j] === newStr[newStr.length - 1 - j]) j++;
    return {
      oldText: oldStr.slice(i, oldStr.length - j),
      newText: newStr.slice(i, newStr.length - j)
    };
  }

  function collectChanges(doc) {
    var changes = [];
    doc.querySelectorAll('[data-source-line]').forEach(function(el) {
      var line = parseInt(el.getAttribute('data-source-line'));
      var currentText = el.textContent;
      var originalText = textSnapshot.get(el);
      if (originalText != null && currentText !== originalText) {
        var diff = minimalDiff(originalText, currentText);
        if (diff.oldText !== diff.newText) {
          changes.push({ line: line, oldText: diff.oldText, newText: diff.newText, el: el });
        }
      }
    });
    return changes;
  }

  function saveInlineEdits() {
    try {
      var doc = frame.contentDocument;
      if (!doc) return;
      var changes = collectChanges(doc);
      if (changes.length === 0) { isEditing = false; return; }

      var sock = frame.contentWindow && frame.contentWindow.socket;
      if (!sock) { isEditing = false; return; }

      var payload = changes.map(function(c) { return { line: c.line, oldText: c.oldText, newText: c.newText }; });
      sock.emit('update_lines', { bufnr: bufnr, changes: payload });

      // Update snapshot and show feedback
      changes.forEach(function(c) {
        textSnapshot.set(c.el, c.el.textContent);
        c.el.style.animation = 'none';
        c.el.offsetHeight; // force reflow
        c.el.style.animation = 'saveFlash 0.6s ease-out';
      });

      editCount += changes.length;
      editCounterEl.textContent = editCount + (editCount === 1 ? ' edit' : ' edits');
      editCounterEl.classList.add('visible');
      showToast('Saved');
      isEditing = false;
    } catch(e) {
      isEditing = false;
    }
  }

  function setupInlineEditing(doc) {
    var markdownBody = doc.querySelector('.markdown-body');
    if (!markdownBody || markdownBody._inlineEditAttached) return;
    markdownBody._inlineEditAttached = true;

    markdownBody.setAttribute('contenteditable', 'true');
    markdownBody.style.outline = 'none';

    snapshotText(doc);

    markdownBody.addEventListener('input', function() {
      isEditing = true;
      clearTimeout(editTimer);
      editTimer = setTimeout(saveInlineEdits, 500);
    });

    markdownBody.addEventListener('blur', function() {
      if (isEditing) {
        clearTimeout(editTimer);
        saveInlineEdits();
      }
    }, true);
  }

  // --- Selection handling in iframe ---
  function setupIframeListeners() {
    try {
      const doc = frame.contentDocument;
      if (!doc || doc._annListenersAttached) return;
      doc._annListenersAttached = true;

      injectStyles();

      doc.addEventListener('mouseup', (e) => {
        setTimeout(() => {
          const sel = doc.getSelection();
          if (sel && sel.toString().trim().length > 0) {
            currentSelection = {
              text: sel.toString().trim(),
              range: sel.getRangeAt(0).cloneRange()
            };
            showToolbar(e);
          } else {
            hideToolbar();
            currentSelection = null;
          }
        }, 10);
      });

      doc.addEventListener('mousedown', (e) => {
        if (!toolbar.contains(e.target)) {
          hideToolbar();
        }
      });

      doc.addEventListener('keydown', handleToolbarKeydown);

      reapplyHighlights();
    } catch(e) {
      console.warn('Cannot access iframe. Highlights won\'t show in preview.');
    }
  }

  frame.addEventListener('load', () => {
    setupIframeListeners();
    loadAnnotations();
    renderList();
    setTimeout(() => {
      setupIframeListeners();
      try { setupInlineEditing(frame.contentDocument); } catch(e) {}
    }, 500);
    setTimeout(observeIframeChanges, 1000);
  });

  // --- Toolbar ---
  // Stores the position of the last selection for popover placement
  var lastSelectionPos = { x: 0, y: 0 };

  function showToolbar(e) {
    const iframeRect = frame.getBoundingClientRect();
    let x = iframeRect.left + e.clientX;
    let y = iframeRect.top + e.clientY - 50;

    // Save selection position for popover use by keyboard shortcuts
    lastSelectionPos = { x: iframeRect.left + e.clientX, y: iframeRect.top + e.clientY + 10 };

    const tw = 360;
    if (x + tw > window.innerWidth) x = window.innerWidth - tw - 10;
    if (x < 10) x = 10;
    if (y < 10) y = iframeRect.top + e.clientY + 20;

    toolbar.style.left = x + 'px';
    toolbar.style.top = y + 'px';
    toolbar.classList.add('visible');
  }

  function hideToolbar() {
    toolbar.classList.remove('visible');
  }

  toolbar.addEventListener('mousedown', (e) => { e.preventDefault(); e.stopPropagation(); });

  // --- Popover positioning ---
  let popoverPosition = { x: 0, y: 0 };
  let editingAnnotationIdx = -1;

  function positionPopover(x, y) {
    const pw = 420, ph = 300;
    if (x + pw > window.innerWidth) x = window.innerWidth - pw - 16;
    if (x < 16) x = 16;
    if (y + ph > window.innerHeight) y = y - ph - 10;
    if (y < 16) y = 16;
    notePopover.style.left = x + 'px';
    notePopover.style.top = y + 'px';
  }

  function openPopoverForNew(x, y) {
    if (!currentSelection) return;
    editingAnnotationIdx = -1;
    const truncated = currentSelection.text.length > 120
      ? currentSelection.text.substring(0, 120) + '...'
      : currentSelection.text;
    notePopoverSelected.textContent = truncated;
    notePopoverSelected.style.display = '';
    notePopoverInput.value = '';
    positionPopover(x, y);
    noteOverlay.classList.add('visible');
    notePopover.classList.add('visible');
    setTimeout(() => notePopoverInput.focus(), 50);
  }

  function openPopoverForEdit(idx, anchorEl) {
    const ann = annotations[idx];
    if (!ann) return;
    editingAnnotationIdx = idx;
    var t = ann.type || TYPE_MODIFY;
    notePopoverLabel.textContent = 'Edit note';
    notePopoverInput.placeholder = t === TYPE_ADD ? 'What to add after this text?' : t === TYPE_DELETE ? 'Reason for deletion' : 'What should be changed?';
    const truncated = ann.text.length > 120 ? ann.text.substring(0, 120) + '...' : ann.text;
    notePopoverSelected.textContent = truncated;
    notePopoverSelected.style.display = '';
    notePopoverInput.value = ann.note || '';
    const rect = anchorEl.getBoundingClientRect();
    positionPopover(rect.left, rect.bottom + 6);
    noteOverlay.classList.add('visible');
    notePopover.classList.add('visible');
    setTimeout(() => { notePopoverInput.focus(); notePopoverInput.select(); }, 50);
  }

  function closePopover() {
    noteOverlay.classList.remove('visible');
    notePopover.classList.remove('visible');
    editingAnnotationIdx = -1;
    currentSelection = null;
  }

  function commitFromPopover() {
    if (editingAnnotationIdx >= 0) {
      annotations[editingAnnotationIdx].note = notePopoverInput.value.trim();
      saveAnnotations();
      renderList();
      closePopover();
      return;
    }

    if (!currentSelection) { closePopover(); return; }

    const note = notePopoverInput.value.trim();
    const id = 'ann-' + (++highlightCounter);
    const ann = {
      id: id,
      type: pendingType,
      text: currentSelection.text.substring(0, 500),
      note: note,
      context: currentSelection.text.substring(0, 60)
    };

    highlightRange(currentSelection.range, id, pendingType);
    try { frame.contentDocument.getSelection().removeAllRanges(); } catch(e) {}

    annotations.push(ann);
    saveAnnotations();
    renderList();
    closePopover();
  }

  var pendingType = TYPE_MODIFY;

  function doModifyAction() {
    pendingType = TYPE_MODIFY;
    hideToolbar();
    popoverPosition = lastSelectionPos;
    notePopoverLabel.textContent = 'Modify';
    notePopoverInput.placeholder = 'What should be changed?';
    openPopoverForNew(lastSelectionPos.x, lastSelectionPos.y);
  }

  function doAddAction() {
    pendingType = TYPE_ADD;
    hideToolbar();
    popoverPosition = lastSelectionPos;
    notePopoverLabel.textContent = 'Add content';
    notePopoverInput.placeholder = 'What to add after this text?';
    openPopoverForNew(lastSelectionPos.x, lastSelectionPos.y);
  }

  function doDeleteAction() {
    if (!currentSelection) return;
    hideToolbar();
    var id = 'ann-' + (++highlightCounter);
    var ann = {
      id: id,
      type: TYPE_DELETE,
      text: currentSelection.text.substring(0, 500),
      note: '',
      context: currentSelection.text.substring(0, 60)
    };
    highlightRange(currentSelection.range, id, TYPE_DELETE);
    try { frame.contentDocument.getSelection().removeAllRanges(); } catch(ex) {}
    annotations.push(ann);
    saveAnnotations();
    renderList();
    currentSelection = null;
    showToast('Marked for deletion');
  }

  function handleToolbarKeydown(e) {
    if (!toolbar.classList.contains('visible')) return;
    if (e.key === 'm' || e.key === 'M') { e.preventDefault(); doModifyAction(); }
    if (e.key === 'a' || e.key === 'A') { e.preventDefault(); doAddAction(); }
    if (e.key === 'd' || e.key === 'D') { e.preventDefault(); doDeleteAction(); }
    if (e.key === 'Escape') hideToolbar();
  }

  toolbar.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (btn.dataset.action === 'delete') doDeleteAction();
      else if (btn.dataset.action === 'add') doAddAction();
      else doModifyAction();
    });
  });

  document.addEventListener('keydown', handleToolbarKeydown);

  noteOverlay.addEventListener('click', closePopover);
  notePopoverCancel.addEventListener('click', closePopover);
  notePopoverSave.addEventListener('click', commitFromPopover);

  notePopoverInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commitFromPopover(); }
    if (e.key === 'Escape') closePopover();
  });

  // --- Render ---
  function renderList() {
    updateCount();

    if (annotations.length === 0) {
      annList.innerHTML = '';
      annList.appendChild(emptyState);
      emptyState.style.display = '';
      return;
    }

    emptyState.style.display = 'none';
    annList.innerHTML = '';

    annotations.forEach((ann, idx) => {
      const item = document.createElement('div');
      item.className = 'ann-item';
      item.dataset.id = ann.id;
      item.style.animationDelay = (idx * 30) + 'ms';

      const annType = ann.type || TYPE_MODIFY;
      item.dataset.type = annType;
      const truncText = ann.text.length > 100 ? ann.text.substring(0, 100) + '...' : ann.text;
      const badgeClass = annType;
      const badgeLabel = annType.charAt(0).toUpperCase() + annType.slice(1);
      const noteHtml = ann.note
        ? `<div class="note"><span class="note-text">${escapeHtml(ann.note)}</span></div>`
        : `<div class="add-note-hint">Click to add a note</div>`;

      item.innerHTML = `
        <button class="remove-btn" data-idx="${idx}" title="Remove">&times;</button>
        <span class="type-badge ${badgeClass}">${badgeLabel}</span>
        <div class="snippet">${escapeHtml(truncText)}</div>
        ${noteHtml}
      `;

      item.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-btn')) return;
        if (e.target.classList.contains('note-text') || e.target.classList.contains('add-note-hint')) {
          e.stopPropagation();
          openPopoverForEdit(idx, item);
          return;
        }
        scrollToAnnotation(ann.id);
      });

      item.querySelector('.remove-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        removeAnnotation(idx);
      });

      annList.appendChild(item);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function scrollToAnnotation(id) {
    try {
      const doc = frame.contentDocument;
      const el = doc.querySelector(`[data-ann-id="${id}"]`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.style.transition = 'background 0.2s ease';
        el.style.background = 'rgba(196, 112, 75, 0.35)';
        setTimeout(() => { el.style.background = ''; }, 1500);
      }
    } catch(e) {}
  }

  function removeAnnotation(idx) {
    const ann = annotations[idx];
    unwrapAllMarks(ann.id);

    annotations.splice(idx, 1);
    saveAnnotations();
    renderList();
  }

  // --- Copy All ---
  copyAllBtn.addEventListener('click', () => {
    if (annotations.length === 0) return;

    let title;
    try { title = frame.contentDocument.title || urlInput.value.trim(); }
    catch(e) { title = urlInput.value.trim(); }

    let md = `# Document Review: ${title}\n\n`;
    md += `Below are annotations on this document. Each annotation includes the original text and a reviewer note.\n\n`;
    md += `## Annotations\n\n`;
    annotations.forEach((ann, i) => {
      const annType = (ann.type || TYPE_MODIFY).toUpperCase();
      const text = ann.text.replace(/\n/g, ' ');
      md += `### ${i + 1}. [${annType}]\n`;
      if (ann.type === TYPE_DELETE) {
        md += `> ~~${text}~~\n`;
        if (ann.note) md += `\n**Reason:** ${ann.note}\n`;
      } else if (ann.type === TYPE_ADD) {
        md += `> ${text}\n`;
        if (ann.note) md += `\n**Insert after:** ${ann.note}\n`;
      } else {
        md += `> ${text}\n`;
        if (ann.note) md += `\n**Change to:** ${ann.note}\n`;
      }
      md += `\n`;
    });
    md += `---\nPlease review these annotations and suggest improvements to the document.\n`;

    navigator.clipboard.writeText(md).then(() => {
      showToast('Copied to clipboard');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = md;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Copied to clipboard');
    });
  });

  // --- Clear All ---
  // --- Custom confirm dialog ---
  const confirmOverlay = document.getElementById('confirmOverlay');
  const confirmCancel = document.getElementById('confirmCancel');
  const confirmOk = document.getElementById('confirmOk');

  function showConfirm(onConfirm) {
    confirmOverlay.classList.add('visible');
    var cleanup = () => { confirmOverlay.classList.remove('visible'); };
    confirmOk.onclick = () => { cleanup(); onConfirm(); };
    confirmCancel.onclick = cleanup;
    confirmOverlay.addEventListener('click', (e) => {
      if (e.target === confirmOverlay) cleanup();
    }, { once: true });
  }

  clearAllBtn.addEventListener('click', () => {
    if (annotations.length === 0) return;
    showConfirm(() => {
      try {
        const doc = frame.contentDocument;
        doc.querySelectorAll('[data-ann-id]').forEach(el => unwrapMark(el));
      } catch(e) {}
      annotations = [];
      localStorage.removeItem(storageKey());
      renderList();
      showToast('All annotations cleared');
    });
  });

  document.addEventListener('mousedown', () => { hideToolbar(); });

  function observeIframeChanges() {
    try {
      const doc = frame.contentDocument;
      if (!doc || !doc.body) return;

      const observer = new MutationObserver(() => {
        if (isEditing) return;
        clearTimeout(observer._timer);
        observer._timer = setTimeout(() => {
          injectStyles();
          if (!doc.querySelector('[data-ann-id]') && annotations.length > 0) {
            reapplyHighlights();
          }
          // Re-snapshot after DOM refresh
          snapshotText(doc);
        }, 300);
      });

      observer.observe(doc.body, { childList: true, subtree: true });
    } catch(e) {}
  }

  // --- Init ---
  loadAnnotations();
  renderList();

})();
</script>
</body>
</html>
